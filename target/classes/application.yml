spring:
  application:
    name: resource

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000

  datasource:
    url: jdbc:mysql://localhost:3306/kiritsu_resource?useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
server:
  servlet:
    context-path: /kiritsu
